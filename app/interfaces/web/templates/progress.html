{% extends "base.html" %}
{% block title %}Procesando — {{ session.name }}{% endblock %}

{% block content %}
<hgroup>
  <h1>Procesando: {{ session.name }}</h1>
  <p>El audio se está limpiando y transcribiendo. Puedes cerrar esta ventana y volver más tarde.</p>
</hgroup>

<article
  id="progress-container"
  hx-get="/sessions/{{ session.id }}/job-status"
  hx-trigger="every 3s"
  hx-swap="innerHTML"
  hx-target="#progress-inner"
>
  <div id="progress-inner">
    <p>Iniciando procesamiento…</p>
    <progress></progress>
  </div>
</article>

<script>
  // Redirigir cuando el servidor indique que está listo
  document.body.addEventListener("htmx:afterSwap", function (evt) {
    try {
      const data = JSON.parse(evt.detail.xhr.responseText);
      if (data.redirect) {
        window.location.href = data.redirect;
      }
      if (data.progress !== undefined) {
        const bar = document.querySelector("progress");
        if (bar) {
          bar.max = 100;
          bar.value = data.progress;
        }
      }
    } catch (_) {}
  });
</script>
{% endblock %}
