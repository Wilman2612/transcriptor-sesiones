<!DOCTYPE html>
<html lang="es" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>{% block title %}Transcriptor de Sesiones{% endblock %}</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@picocss/pico@2/css/pico.min.css" />
  <link rel="stylesheet" href="/static/css/app.css" />
  <script src="https://unpkg.com/htmx.org@1.9.12" defer></script>
  {% block head %}{% endblock %}
</head>
<body>
  <header class="container">
    <nav>
      <ul>
        <li><strong><a href="/" class="no-underline">📋 Transcriptor Municipal</a></strong></li>
      </ul>
      <ul>
        <li><a href="/upload">Nueva sesión</a></li>
      </ul>
    </nav>
  </header>
  <main class="container">
    {% block content %}{% endblock %}
  </main>
  <footer class="container">
    <small>Herramienta de transcripción asistida por IA — uso interno</small>
  </footer>
</body>
</html>
